# ============================================================
# PUERTO DEL SERVIDOR
# ============================================================
server.port=8081

# ============================================================
# PERFIL H2 (DESARROLLO - DEFAULT)
# ============================================================
spring.profiles.active=h2

# Configuración H2
spring.datasource.h2.url=jdbc:h2:mem:test
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.hibernate.ddl-auto=create #CREA LA BASE DE DATOS CADA VEZ QUE SE INICIA LA APLICACIÓN, ÚTIL PARA DESARROLLO. EN PRODUCCIÓN, USAR update O validate.

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

